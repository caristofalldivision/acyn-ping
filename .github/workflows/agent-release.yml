name: Agent Release

# Triggers:
#   - Push a tag like `agent-v0.2.0` (recommended; use agent/release.sh)
#   - Or click "Run workflow" in the Actions tab and type a version
on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0) — creates tag agent-v<version>'
        required: true
        default: '0.2.0'

permissions:
  contents: write   # needed to create the GitHub Release

env:
  # Opt in to Node 24 for JS-based actions (checkout, setup-go, action-gh-release).
  # Silences the Node 20 deprecation warning ahead of the forced switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version + tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="agent-v${VERSION}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#agent-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: agent/go.sum

      - name: Build all platforms
        working-directory: agent
        run: |
          go mod download
          make clean
          make all VERSION=${{ steps.ver.outputs.version }}
          ls -lh dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Ping Agent ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            agent/dist/*
